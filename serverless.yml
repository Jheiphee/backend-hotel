service: marc-hotel-backend

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs20.x
  region: ap-southeast-1

  environment:
    DB_HOST: ${env:DB_HOST}
    DB_USER: ${env:DB_USER}
    DB_PASSWORD: ${env:DB_PASSWORD}
    DB_NAME: ${env:DB_NAME}
    DB_PORT: ${env:DB_PORT}

package:
  individually: true

functions:

  # =========================
  # 🔥 ANALYTICS
  # =========================
  bestRoomBookings:
    handler: functions/analytics/bestRoomBookings.handler
    events:
      - httpApi:
          path: /analytics/best-room-bookings
          method: GET

  bestRoomRevenue:
    handler: functions/analytics/bestRoomRevenue.handler
    events:
      - httpApi:
          path: /analytics/best-room-revenue
          method: GET

  topGuestPayment:
    handler: functions/analytics/topGuestPayment.handler
    events:
      - httpApi:
          path: /analytics/top-guest-payment
          method: GET

  topBookingDate:
    handler: functions/analytics/topBookingDate.handler
    events:
      - httpApi:
          path: /analytics/top-booking-date
          method: GET

  topRevenueDate:
    handler: functions/analytics/topRevenueDate.handler
    events:
      - httpApi:
          path: /analytics/top-revenue-date
          method: GET

  getMembers:
    handler: functions/analytics/getMembers.handler
    events:
      - httpApi:
          path: /analytics/members
          method: GET

  getMembersCount:
    handler: functions/analytics/getMembersCount.handler
    events:
      - httpApi:
          path: /analytics/members-count
          method: GET


  # =========================
  # 🏨 ROOMS
  # =========================
  getRooms:
    handler: functions/rooms/getRooms.handler
    events:
      - httpApi:
          path: /rooms
          method: GET

  getRoomByNumber:
    handler: functions/rooms/getRoomByNumber.handler
    events:
      - httpApi:
          path: /rooms/{room_number}
          method: GET

  createRoom:
    handler: functions/rooms/createRoom.handler
    events:
      - httpApi:
          path: /rooms
          method: POST

  updateRoom:
    handler: functions/rooms/updateRoom.handler
    events:
      - httpApi:
          path: /rooms/{room_number}
          method: PUT

  deleteRoom:
    handler: functions/rooms/deleteRoom.handler
    events:
      - httpApi:
          path: /rooms/{room_number}
          method: DELETE


  # =========================
  # 📅 BOOKINGS
  # =========================
  getBookings:
    handler: functions/bookings/getBookings.handler
    events:
      - httpApi:
          path: /bookings
          method: GET

  createBooking:
    handler: functions/bookings/createBooking.handler
    events:
      - httpApi:
          path: /bookings
          method: POST

  updateBooking:
    handler: functions/bookings/updateBooking.handler
    events:
      - httpApi:
          path: /bookings/{booking_id}
          method: PUT

  deleteBooking:
    handler: functions/bookings/deleteBooking.handler
    events:
      - httpApi:
          path: /bookings/{booking_id}
          method: DELETE


  # =========================
  # 💳 PAYMENTS
  # =========================
  getAllPayments:
    handler: functions/payments/getAllPayments.handler
    events:
      - httpApi:
          path: /payments
          method: GET

  getPaymentById:
    handler: functions/payments/getPaymentById.handler
    events:
      - httpApi:
          path: /payments/{payment_id}
          method: GET

  getPaymentsByStatus:
    handler: functions/payments/getPaymentsByStatus.handler
    events:
      - httpApi:
          path: /payments/status/{status}
          method: GET

  getPaymentsByMethod:
    handler: functions/payments/getPaymentsByMethod.handler
    events:
      - httpApi:
          path: /payments/method/{method}
          method: GET

  createPayment:
    handler: functions/payments/createPayment.handler
    events:
      - httpApi:
          path: /payments
          method: POST


  # =========================
  # 👤 GUESTS
  # =========================
  getGuests:
    handler: functions/guests/getGuests.handler
    events:
      - httpApi:
          path: /guests
          method: GET

  createGuest:
    handler: functions/guests/createGuest.handler
    events:
      - httpApi:
          path: /guests
          method: POST


  # =========================
  # 👔 EMPLOYMENT
  # =========================
  getEmployment:
    handler: functions/employment/getEmployment.handler
    events:
      - httpApi:
          path: /employment
          method: GET

  searchEmployment:
    handler: functions/employment/searchEmployment.handler
    events:
      - httpApi:
          path: /employment/search
          method: GET


  # =========================
  # 🧑‍💼 PROFILES
  # =========================
  getProfiles:
    handler: functions/profiles/getProfiles.handler
    events:
      - httpApi:
          path: /profiles
          method: GET

  getProfileById:
    handler: functions/profiles/getProfileById.handler
    events:
      - httpApi:
          path: /profiles/{id}
          method: GET

  createProfile:
    handler: functions/profiles/createProfile.handler
    events:
      - httpApi:
          path: /profiles
          method: POST

  updateProfile:
    handler: functions/profiles/updateProfile.handler
    events:
      - httpApi:
          path: /profiles/{id}
          method: PUT

  deleteProfile:
    handler: functions/profiles/deleteProfile.handler
    events:
      - httpApi:
          path: /profiles/{id}
          method: DELETE